<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>六级口语练习系统</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="app">
        <header class="header">
            <h1>🎙️ 六级口语练习系统</h1>
            <p class="subtitle">每天 15 分钟，从“看得懂”练到“说得顺”</p>
        </header>

        <nav class="tabs">
            <button class="tab active" data-mode="chat">AI 情景对话</button>
            <button class="tab" data-mode="topic">话题独白</button>
            <button class="tab" data-mode="shadow">影子跟读</button>
            <button class="tab" data-mode="expression">每日表达</button>
            <button class="tab" data-mode="history">练习记录</button>
        </nav>

        <main class="main">
            <!-- AI 情景对话 -->
            <section id="panel-chat" class="panel active">
                <div class="panel-header">
                    <h2>AI 情景对话</h2>
                    <select id="chat-scenario">
                        <option value="daily">日常闲聊</option>
                        <option value="interview">英文面试</option>
                        <option value="debate">观点辩论</option>
                        <option value="academic">学术讨论</option>
                    </select>
                    <button id="new-chat" class="btn secondary">新对话</button>
                </div>
                <div id="chat-messages" class="chat-messages"></div>
                <div class="input-area">
                    <button id="mic-chat" class="btn mic">🎤 开始录音</button>
                    <input type="text" id="chat-input" placeholder="输入英文，或按住麦克风说话…">
                    <button id="send-chat" class="btn primary">发送</button>
                </div>
                <p class="tip">💡 想用 AI 对话请双击 configure.bat 配置 API Key；不配置也可使用话题独白、影子跟读、每日表达。</p>
            </section>

            <!-- 话题独白 -->
            <section id="panel-topic" class="panel">
                <div class="panel-header">
                    <h2>话题独白</h2>
                    <button id="next-topic" class="btn primary">换一题</button>
                </div>
                <div class="card">
                    <span id="topic-category" class="tag"></span>
                    <h3 id="topic-title"></h3>
                    <ul id="topic-hints"></ul>
                </div>
                <div class="timer-box">
                    <span id="timer">00:00</span>
                    <button id="record-topic" class="btn mic">🎤 开始录音</button>
                </div>
                <div class="result-box">
                    <h4>识别结果</h4>
                    <p id="topic-result" class="result-text">点击麦克风后开始作答，系统会尝试识别你的发音。</p>
                </div>
            </section>

            <!-- 影子跟读 -->
            <section id="panel-shadow" class="panel">
                <div class="panel-header">
                    <h2>影子跟读</h2>
                    <button id="next-shadow" class="btn primary">换一段</button>
                </div>
                <div class="card">
                    <h3 id="shadow-title"></h3>
                    <p id="shadow-text" class="shadow-text"></p>
                    <p id="shadow-hint" class="hint"></p>
                </div>
                <div class="actions">
                    <button id="play-shadow" class="btn secondary">🔊 朗读范文</button>
                    <button id="record-shadow" class="btn mic">🎤 跟读录音</button>
                </div>
                <div class="result-box">
                    <h4>你的跟读</h4>
                    <p id="shadow-result" class="result-text">录音后会显示识别结果。</p>
                </div>
            </section>

            <!-- 每日表达 -->
            <section id="panel-expression" class="panel">
                <div class="panel-header">
                    <h2>每日表达</h2>
                    <button id="next-expression" class="btn primary">换一个</button>
                </div>
                <div class="card expression-card">
                    <p id="expr-en" class="expr-en"></p>
                    <p id="expr-zh" class="expr-zh"></p>
                    <p id="expr-example" class="expr-example"></p>
                </div>
                <div class="actions">
                    <button id="play-expression" class="btn secondary">🔊 朗读表达</button>
                    <button id="record-expression" class="btn mic">🎤 跟读练习</button>
                </div>
                <div class="result-box">
                    <h4>识别结果</h4>
                    <p id="expr-result" class="result-text"></p>
                </div>
            </section>

            <!-- 练习记录 -->
            <section id="panel-history" class="panel">
                <div class="panel-header">
                    <h2>练习记录</h2>
                    <button id="refresh-history" class="btn secondary">刷新</button>
                </div>
                <div id="history-list" class="history-list"></div>
            </section>
        </main>

        <footer class="footer">
            <p>本地运行，数据仅存于你的电脑。建议使用 Chrome / Edge 浏览器。</p>
        </footer>
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
